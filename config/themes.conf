# -- VinceLiuice Elegant Series ------------------------------------------------
# NOTE: All 4 Elegant entries share one repo with NO static per-variant
# folder - the repo only contains raw assets (backgrounds/, common/,
# config/); theme.txt is produced at build time by install.sh (writes
# straight to /boot/grub, needs root) or generate.sh (builds an
# Elegant-<theme>-<type>-<side>-<color> folder into a chosen directory, no
# root needed). theamify does not drive either script yet, so `theamify get`
# on these entries will clone successfully but fail theme.txt validation -
# that's expected, not a misconfigured SUBDIR. See the Elegant themes note
# in README.md for the manual workaround until generate.sh support lands.
Elegant-Mountain|https://github.com/vinceliuice/Elegant-grub2-themes|Elegant-mountain|Elegant mountain landscape minimal GRUB theme|https://www.gnome-look.org/p/2206121|elegant,mountain,landscape,nature,minimal,dark
Elegant-Forest|https://github.com/vinceliuice/Elegant-grub2-themes|Elegant-forest|Elegant forest path landscape GRUB theme|https://www.gnome-look.org/p/2206111|elegant,forest,landscape,nature,green,calm
Elegant-Mojave|https://github.com/vinceliuice/Elegant-grub2-themes|Elegant-mojave|Elegant warm Mojave desert GRUB theme|https://www.gnome-look.org/p/2206118|elegant,mojave,desert,warm,macos,earth
Elegant-Wave|https://github.com/vinceliuice/Elegant-grub2-themes|Elegant-wave|Elegant orange wave abstract GRUB theme|https://www.gnome-look.org/p/2206122|elegant,wave,orange,abstract,bold

